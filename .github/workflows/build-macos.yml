name: Builder macOS

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build PluginLoader for macOS
    runs-on: macos-14

    steps:
    - name: Checkout 🧰
      uses: actions/checkout@v4

    - name: Set up NodeJS 20 💎
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Python 3.11.7 🐍
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.7"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: false

    - name: Install Python dependencies ⬇️
      working-directory: ./backend
      run: |
        poetry self add "poetry-dynamic-versioning[plugin]"
        poetry install --no-interaction

    - name: Install JS dependencies ⬇️
      working-directory: ./frontend
      run: |
        npm i -g pnpm
        pnpm i --frozen-lockfile --dangerously-allow-all-builds

    - name: Build JS Frontend 🛠️
      working-directory: ./frontend
      run: pnpm run build

    - name: Build Python Backend 🛠️
      working-directory: ./backend
      run: |
        poetry dynamic-versioning
        poetry run pyinstaller pyinstaller.spec
        cp ./dist/PluginLoader ./dist/PluginLoader-macos

    - name: Upload package artifact ⬆️
      uses: actions/upload-artifact@v4
      with:
        name: PluginLoader macOS
        path: |
          ./backend/dist/PluginLoader
          ./backend/dist/PluginLoader-macos
